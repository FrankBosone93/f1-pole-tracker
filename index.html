<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js per il grafico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-12">

    <header class="text-center my-6">
        <h1 class="text-2xl font-bold text-[#E10600] tracking-wider">F1 POLE TRACKER</h1>
        <p class="text-gray-400 text-sm">Calendario Completo Storico & Live 2021 - 2026</p>
        <p id="dataSourceBadge" class="text-[10px] text-gray-600 mt-1">Caricamento dati...</p>
    </header>

    <!-- Selettore Circuito -->
    <div class="mb-6">
        <label for="circuitSelect" class="block text-sm font-medium text-gray-300 mb-2">Scegli un circuito:</label>
        <select id="circuitSelect" class="w-full bg-[#1E1E1E] text-white border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-[#E10600]">
            <!-- Inseriti automaticamente dallo script -->
        </select>
    </div>

    <!-- Contenitore Grafico -->
    <div class="bg-[#1E1E1E] p-4 rounded-xl border border-gray-800 mb-6">
        <div class="text-xs text-gray-400 mb-2 text-right">In alto = Più Veloce ⚡</div>
        <div style="position: relative; height: 200px; max-height: 200px; width: 100%; overflow: hidden;">
            <canvas id="poleChart"></canvas>
        </div>
    </div>

    <!-- Pulsante per aprire il Pannello Admin -->
    <button onclick="toggleAdminPanel()" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs py-2 px-4 rounded-lg mb-6 border border-gray-700 transition-colors cursor-pointer">
        🔧 Apri Pannello Aggiornamento Live (2026)
    </button>

    <!-- Pannello Inserimento Nuovi Dati 2026 (Nascosto di default) -->
    <div id="adminPanel" class="hidden bg-[#1E1E1E] p-4 rounded-xl border border-[#E10600] mb-6 space-y-3">
        <h3 class="text-sm font-bold text-[#E10600]">AGGIORNA POLE POSITION 2026</h3>
        
        <div>
            <label class="block text-xs text-gray-400 mb-1">Circuito da aggiornare</label>
            <select id="adminCircuit" class="w-full bg-gray-900 text-white text-sm p-2 rounded border border-gray-700"></select>
        </div>
        
        <div class="grid grid-cols-2 gap-2">
            <div>
                <label class="block text-xs text-gray-400 mb-1">Pilota</label>
                <input type="text" id="adminDriver" placeholder="Es. Charles Leclerc" class="w-full bg-gray-900 text-white text-sm p-2 rounded border border-gray-700">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Scuderia</label>
                <input type="text" id="adminTeam" placeholder="Es. Ferrari" class="w-full bg-gray-900 text-white text-sm p-2 rounded border border-gray-700">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div>
                <label class="block text-xs text-gray-400 mb-1">Tempo (MIN:SEC.ms)</label>
                <input type="text" id="adminTime" placeholder="Es. 1:12.345" class="w-full bg-gray-900 text-white text-sm p-2 rounded border border-gray-700">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Meteo + Emoji</label>
                <input type="text" id="adminWeather" placeholder="Es. ☀️ Sereno" class="w-full bg-gray-900 text-white text-sm p-2 rounded border border-gray-700">
            </div>
        </div>

        <div class="flex gap-2 pt-2">
            <button onclick="saveNewPole()" class="flex-1 bg-[#E10600] hover:bg-red-700 text-white font-bold text-xs py-2 rounded transition-colors cursor-pointer">Salva nei Dati 2026</button>
            <button onclick="resetToDefault()" class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-3 rounded transition-colors cursor-pointer" title="Ripristina database originale">Reset</button>
        </div>

        <div class="flex gap-2 pt-1 border-t border-gray-700 mt-2">
            <button onclick="exportData()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-200 text-xs py-2 rounded transition-colors cursor-pointer mt-2" title="Scarica un backup di tutti i dati in formato JSON">💾 Esporta JSON</button>
            <button onclick="document.getElementById('importFileInput').click()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-200 text-xs py-2 rounded transition-colors cursor-pointer mt-2" title="Carica un backup JSON precedentemente esportato">📂 Importa JSON</button>
            <input type="file" id="importFileInput" accept="application/json" class="hidden" onchange="importData(event)">
        </div>
    </div>

    <!-- Pulsante Vista Classifica -->
    <button onclick="toggleClassificaPanel()" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs py-2 px-4 rounded-lg mb-6 border border-gray-700 transition-colors cursor-pointer">
        🏆 Apri Vista Classifica
    </button>

    <!-- Pannello Classifica (Nascosto di default) -->
    <div id="classificaPanel" class="hidden bg-[#1E1E1E] p-4 rounded-xl border border-gray-800 mb-6 space-y-4">
        <div>
            <h3 class="text-sm font-bold text-[#E10600] mb-2">🏆 Classifica Piloti (n° Pole Position)</h3>

        </div>
        <div>

            <div id="teamRanking" class="space-y-1 text-sm"></div>
        </div>
        <div class="text-xs text-gray-500 pt-2 border-t border-gray-700" id="classificaMeta"></div>
    </div>

            {year: 2022, circuit: "Abu Dhabi (Yas Marina)", driver: "Max Verstappen", team: "Red Bull", timeStr: "1:23.824", seconds: 83.824, weather: "☀️ Sereno"},
            {year: 2023, circuit: "Abu Dhabi (Yas Marina)", driver: "Max Verstappen", team: "Red Bull", timeStr: "1:24.008", seconds: 84.008, weather: "☀️ Sereno"},
            {year: 2024, circuit: "Abu Dhabi (Yas Marina)", driver: "Lando Norris", team: "McLaren", timeStr: "1:22.595", seconds: 82.595, weather: "☀️ Sereno"},
            {year: 2025, circuit: "Abu Dhabi (Yas Marina)", driver: "Max Verstappen", team: "Red Bull", timeStr: "1:22.207", seconds: 82.207, weather: "☀️ Asciutto"},

            // === PAUL RICARD (FRANCIA) ===
            {year: 2021, circuit: "Paul Ricard (Francia)", driver: "Max Verstappen", team: "Red Bull", timeStr: "1:29.990", seconds: 89.99, weather: "☀️ Soleggiato"},
            {year: 2022, circuit: "Paul Ricard (Francia)", driver: "Charles Leclerc", team: "Ferrari", timeStr: "1:30.872", seconds: 90.872, weather: "☀️ Caldo Torrido"},

            // === SOCHI (RUSSIA) ===
            {year: 2021, circuit: "Sochi (Russia)", driver: "Lando Norris", team: "McLaren", timeStr: "1:41.993", seconds: 101.993, weather: "🌧️ Pioggia / Umido"},

            // === PORTIMÃO (PORTOGALLO) ===
            {year: 2021, circuit: "Portimão (Portogallo)", driver: "Valtteri Bottas", team: "Mercedes", timeStr: "1:18.348", seconds: 78.348, weather: "☀️ Sereno"},

            // === ISTANBUL (TURCHIA) ===
            {year: 2021, circuit: "Istanbul (Turchia)", driver: "Valtteri Bottas", team: "Mercedes", timeStr: "1:22.998", seconds: 82.998, weather: "🌧️ Umido bagnato"}

        ];

        // baseData = fonte di verità "ufficiale": data.json se raggiungibile, altrimenti fallbackData
        let baseData = fallbackData;
        let poleData = [];

        const select = document.getElementById('circuitSelect');
        const adminCircuit = document.getElementById('adminCircuit');
        const detailsList = document.getElementById('detailsList');
        const dataSourceBadge = document.getElementById('dataSourceBadge');
        let currentChart = null;

        function populateCircuitSelectors(circuits) {
            select.innerHTML = '';
            adminCircuit.innerHTML = '';
            circuits.forEach(c => {
                const opt1 = document.createElement('option');
                opt1.value = c; opt1.innerText = c;
                select.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = c; opt2.innerText = c;
                adminCircuit.appendChild(opt2);
            });
        }

        async function initApp() {
            try {
                const response = await fetch('data.json', { cache: 'no-store' });
                if(!response.ok) throw new Error('data.json non raggiungibile (status ' + response.status + ')');
                baseData = await response.json();
                if(dataSourceBadge) dataSourceBadge.innerText = '🟢 Dati aggiornati da data.json';
            } catch(err) {
                // Probabile apertura del file in locale (file://) oppure data.json assente:
                // si usa il fallback incorporato nel codice.
                baseData = fallbackData;
                if(dataSourceBadge) dataSourceBadge.innerText = '🟡 Dati di fallback (data.json non raggiungibile)';
                console.warn('Impossibile caricare data.json, uso il fallback incorporato.', err);
            }

            // Le modifiche fatte in locale dal pannello Aggiornamento Live restano
            // salvate solo nel browser di chi le fa (localStorage), sopra ai dati ufficiali.
            const localOverride = JSON.parse(localStorage.getItem('f1_pole_data') || 'null');
            poleData = localOverride || [...baseData];

            const uniqueCircuits = [...new Set(poleData.map(d => d.circuit))].sort();
            populateCircuitSelectors(uniqueCircuits);

            select.addEventListener('change', (e) => updateApp(e.target.value));
            updateApp(uniqueCircuits[0]);
        }

        function formatSecondsToTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = Math.floor(totalSeconds % 60);
            const ms = Math.round((totalSeconds % 1) * 1000);
            return mins + ':' + secs.toString().padStart(2, '0') + '.' + ms.toString().padStart(3, '0');
        }

        function parseTimeToSeconds(timeStr) {
            try {
                const parts = timeStr.split(':');
                const mins = parseInt(parts[0], 10);
                const secs = parseFloat(parts[1]);
                return (mins * 60) + secs;
            } catch(e) {
                return null;
            }
        }

        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
        }

        // --- VALIDAZIONE INPUT (più severa) ---
        // Nomi: lettere (anche accentate), spazi, apostrofi e trattini, 2-40 caratteri
        const NAME_REGEX = /^[A-Za-zÀ-ÖØ-öø-ÿ' -]{2,40}$/;
        // Tempo pole: M:SS.mmm con minuti 0-9, secondi 00-59, millisecondi 000-999
        const TIME_REGEX = /^([0-9]):([0-5][0-9])\.([0-9]{3})$/;

        function validatePoleEntry(circuit, driver, team, timeStr, weather) {
            const errors = [];

            if(!circuit) {
                errors.push("Seleziona un circuito.");
            }
            if(!driver || !NAME_REGEX.test(driver)) {
                errors.push("Il nome del Pilota non è valido (usa solo lettere, spazi, apostrofi o trattini, 2-40 caratteri).");
            }
            if(!team || !NAME_REGEX.test(team)) {
                errors.push("Il nome della Scuderia non è valido (usa solo lettere, spazi, apostrofi o trattini, 2-40 caratteri).");
            }
            if(!timeStr || !TIME_REGEX.test(timeStr)) {
                errors.push("Formato tempo non valido. Usa MINUTI:SECONDI.MILLISECONDI, es. 1:12.345 (secondi 00-59, millisecondi a 3 cifre).");
            }
            if(weather && weather.length > 40) {
                errors.push("La descrizione Meteo è troppo lunga (max 40 caratteri).");
            }

            return errors;
        }

        function saveNewPole() {
            const circuit = adminCircuit.value;
            const driver = document.getElementById('adminDriver').value.trim();
            const team = document.getElementById('adminTeam').value.trim();
            const timeStr = document.getElementById('adminTime').value.trim();
            const weather = document.getElementById('adminWeather').value.trim();

            const errors = validatePoleEntry(circuit, driver, team, timeStr, weather);
            if(errors.length > 0) {
                alert("Impossibile salvare:\n\n- " + errors.join("\n- "));
                return;
            }

            const seconds = parseTimeToSeconds(timeStr);
            if(seconds === null || isNaN(seconds)) {
                alert("Formato tempo non valido! Usa MINUTI:SECONDI.MILLISECONDI (es. 1:12.530)");
                return;
            }

            const existingIndex = poleData.findIndex(d => d.circuit === circuit && d.year === 2026);
            const newEntry = { year: 2026, circuit, driver, team, timeStr, seconds, weather: weather || "☀️ Sereno" };

            if(existingIndex > -1) {
                poleData[existingIndex] = newEntry;
            } else {
                poleData.push(newEntry);
            }

            localStorage.setItem('f1_pole_data', JSON.stringify(poleData));
            select.value = circuit; 
            updateApp(circuit);
            
            document.getElementById('adminDriver').value = "";
            document.getElementById('adminTeam').value = "";
            document.getElementById('adminTime').value = "";
            document.getElementById('adminWeather').value = "";
            alert(`Pole del 2026 per ${circuit} salvata con successo!`);
        }

        function resetToDefault() {
            if(confirm("Vuoi cancellare tutte le modifiche locali e ripristinare i dati ufficiali (data.json)?")) {
                localStorage.removeItem('f1_pole_data');
                poleData = [...baseData];
                const uniqueCircuits = [...new Set(poleData.map(d => d.circuit))].sort();
                populateCircuitSelectors(uniqueCircuits);
                updateApp(select.value && uniqueCircuits.includes(select.value) ? select.value : uniqueCircuits[0]);
            }
        }

        // --- BACKUP / RIPRISTINO TRAMITE FILE JSON ---
        function exportData() {
            const payload = {
                exportedAt: new Date().toISOString(),
                source: "F1 Pole Tracker",
                data: poleData
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0,10);
            a.href = url;
            a.download = `f1_pole_data_backup_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function isValidPoleDataArray(arr) {
            if(!Array.isArray(arr)) return false;
            return arr.every(d =>
                d && typeof d.year === 'number' &&
                typeof d.circuit === 'string' && d.circuit.length > 0 &&
                typeof d.driver === 'string' && NAME_REGEX.test(d.driver) &&
                typeof d.team === 'string' && NAME_REGEX.test(d.team) &&
                typeof d.timeStr === 'string' && TIME_REGEX.test(d.timeStr) &&
                typeof d.seconds === 'number' && !isNaN(d.seconds) &&
                typeof d.weather === 'string'
            );
        }

        function importData(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    const importedArray = Array.isArray(parsed) ? parsed : parsed.data;

                    if(!isValidPoleDataArray(importedArray)) {
                        alert("Il file JSON non è valido o contiene dati mal formattati. Import annullato.");
                        return;
                    }

                    if(!confirm(`Trovate ${importedArray.length} pole position nel file. Vuoi sostituire tutti i dati attuali con questi importati?`)) {
                        return;
                    }

                    poleData = importedArray;
                    localStorage.setItem('f1_pole_data', JSON.stringify(poleData));

                    // Ricostruisce la select dei circuiti nel caso siano stati importati nuovi circuiti
                    const importedCircuits = [...new Set(poleData.map(d => d.circuit))].sort();
                    select.innerHTML = '';
                    adminCircuit.innerHTML = '';
                    importedCircuits.forEach(c => {
                        const opt1 = document.createElement('option');
                        opt1.value = c; opt1.innerText = c;
                        select.appendChild(opt1);
                        const opt2 = document.createElement('option');
                        opt2.value = c; opt2.innerText = c;
                        adminCircuit.appendChild(opt2);
                    });

                    updateApp(importedCircuits[0]);
                    alert("Import completato con successo!");
                } catch(err) {
                    alert("Errore nella lettura del file JSON: " + err.message);
                } finally {
                    event.target.value = "";
                }
            };
            reader.readAsText(file);
        }

        // --- VISTA CLASSIFICA ---
        function toggleClassificaPanel() {
            const panel = document.getElementById('classificaPanel');
            panel.classList.toggle('hidden');
            if(!panel.classList.contains('hidden')) {
                renderClassifica();
            }
        }

        function renderClassifica() {
            const driverCounts = {};
            const teamCounts = {};

            poleData.forEach(d => {
                driverCounts[d.driver] = (driverCounts[d.driver] || 0) + 1;
                teamCounts[d.team] = (teamCounts[d.team] || 0) + 1;
            });

            const sortedDrivers = Object.entries(driverCounts).sort((a,b) => b[1] - a[1]);
            const sortedTeams = Object.entries(teamCounts).sort((a,b) => b[1] - a[1]);

            const medal = (i) => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;

            const driverRanking = document.getElementById('driverRanking');
            driverRanking.innerHTML = sortedDrivers.map(([name, count], i) => `
                <div class="flex justify-between items-center bg-gray-900 rounded px-3 py-1.5">
                    <span>${medal(i)} ${name}</span>
                    <span class="font-bold text-[#E10600]">${count}</span>
                </div>
            `).join('');

            const teamRanking = document.getElementById('teamRanking');
            teamRanking.innerHTML = sortedTeams.map(([name, count], i) => `
                <div class="flex justify-between items-center bg-gray-900 rounded px-3 py-1.5">
                    <span>${medal(i)} ${name}</span>
                    <span class="font-bold text-[#E10600]">${count}</span>
                </div>
            `).join('');

            document.getElementById('classificaMeta').innerText =
                `Totale pole position registrate: ${poleData.length} · Circuiti: ${new Set(poleData.map(d=>d.circuit)).size}`;
        }

        function updateApp(circuitName) {
            const filtered = poleData.filter(d => d.circuit === circuitName).sort((a,b) => a.year - b.year);
            
            if(currentChart) currentChart.destroy();
            
            const ctx = document.getElementById('poleChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(d => d.year),
                    datasets: [{
                        data: filtered.map(d => d.seconds),
                        borderColor: '#E10600',
                        backgroundColor: 'rgba(225, 6, 0, 0.1)',
                        borderWidth: 3,
                        tension: 0.2,
                        pointBackgroundColor: '#ffffff',
                        pointHoverBackgroundColor: '#E10600',
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            reverse: true,
                            grid: { color: '#2a2a2a' },
                            ticks: { 
                                color: '#a0aec0',
                                callback: function(value) { return formatSecondsToTime(value); }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#a0aec0' }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return " Tempo: " + filtered[context.dataIndex].timeStr;
                                }
                            }
                        }
                    }
                }
            });

            // Record storico del circuito = tempo più basso tra tutti gli anni disponibili
            const recordSeconds = filtered.length > 0 ? Math.min(...filtered.map(d => d.seconds)) : null;

            detailsList.innerHTML = '';
            [...filtered].reverse().forEach(d => {
                const isRecord = recordSeconds !== null && d.seconds === recordSeconds;
                const card = document.createElement('div');
                card.className = "bg-[#1E1E1E] p-4 rounded-xl border flex flex-col gap-1 transition-all duration-200 hover:border-gray-700 " +
                    (isRecord ? "border-yellow-500" : "border-gray-800");
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-400">Anno ${d.year} ${isRecord ? '<span class="text-yellow-400" title="Record storico del circuito">🏆 Record</span>' : ''}</span>
                        <span class="text-xl font-black text-[#E10600] tracking-tight">${d.timeStr}</span>
                    </div>
                    <div class="text-sm text-gray-200 mt-1">🏎️ <span class="font-semibold text-white">${d.driver}</span></div>
                    <div class="text-xs text-gray-400">Scuderia: <span class="text-gray-300 font-medium">${d.team}</span></div>
                    <div class="text-xs text-cyan-400 mt-1 flex items-center gap-1">Metereologia: ${d.weather}</div>
                `;
                detailsList.appendChild(card);
            });
        }

        initApp();
    </script>
