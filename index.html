<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Pole Position Tracker Completo (2021-2026)</title>
    <!-- Tailwind CSS per la grafica -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js per il grafico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-md md:max-w-6xl mx-auto pb-12">

    <header class="text-center my-6 md:my-8">
        <h1 class="text-2xl md:text-4xl font-bold text-[#E10600] tracking-wider">F1 POLE TRACKER</h1>
        <p class="text-gray-400 text-sm md:text-base">Calendario Completo Storico & Live 2021 - 2026</p>
        <p id="dataSourceBadge" class="text-[10px] text-gray-600 mt-1">Caricamento dati...</p>
    </header>

    <div id="mainGrid" class="md:grid md:gap-4 md:items-start" style="grid-template-columns: 66.67% 12px 33.33%;">

        <!-- Colonna sinistra (desktop, 2/3 dello schermo di default, trascinabile): selettore, grafico, classifica. Su mobile è semplicemente in cima. -->
        <div id="leftColumn" class="md:sticky md:top-8">
            <!-- Selettore Circuito -->
            <div class="mb-6 md:max-w-sm">
                <label for="circuitSelect" class="block text-sm font-medium text-gray-300 mb-2">Scegli un circuito:</label>
                <select id="circuitSelect" class="w-full bg-[#1E1E1E] text-white border border-gray-700 rounded-lg p-3 focus:outline-none focus:border-[#E10600]">
                    <!-- Inseriti automaticamente dallo script -->
                </select>
            </div>

            <!-- Contenitore Grafico -->
            <div id="chartCard" class="bg-[#1E1E1E] p-4 rounded-xl border border-gray-800 mb-6 md:mb-0">
                <div class="text-xs text-gray-400 mb-2 text-right">In basso = Più Veloce ⚡</div>
                <div id="chartContainer" class="relative w-full h-[200px] md:h-[440px] overflow-hidden">
                    <canvas id="poleChart"></canvas>
                </div>
            </div>

            <!-- Divisore trascinabile (solo desktop) per ridimensionare l'altezza del grafico.
                 Il pillolo interno viene centrato via JS sull'asse X reale del grafico (non
                 sulla larghezza della card), quindi qui niente justify-center. -->
            <div id="vResizeHandle" class="hidden md:flex w-full items-center cursor-row-resize group py-3 mb-3">
                <div class="h-1 w-24 rounded-full bg-gray-700 group-hover:bg-[#E10600] transition-colors"></div>
            </div>

            <!-- Pulsanti Vista Classifica / Calendario -->
            <div class="flex gap-2 mb-6 md:max-w-sm">
                <button onclick="toggleClassificaPanel()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs py-2 px-3 rounded-lg border border-gray-700 transition-colors cursor-pointer">
                    🏆 Classifica
                </button>
                <button onclick="toggleCalendarPanel()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs py-2 px-3 rounded-lg border border-gray-700 transition-colors cursor-pointer">
                    📅 <span id="calendarButtonLabel">Calendario</span>
                </button>
            </div>

            <!-- Pannello Classifica (Nascosto di default). Larghezza impostata via
                 JS pari al 2/3 di default del grafico (vedi applyClassificaPanelWidth),
                 indipendente da un eventuale ridimensionamento live del grafico stesso. -->
            <div id="classificaPanel" class="hidden bg-[#1E1E1E] p-4 rounded-xl border border-gray-800 mb-6">
                <div class="space-y-4 md:space-y-0 md:grid md:grid-cols-2 md:gap-6">
                    <div>
                        <h3 class="text-sm font-bold text-[#E10600] mb-2" id="driverRankingTitle">🏆 Classifica Piloti</h3>
                        <div id="driverRanking" class="space-y-1 text-sm"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-bold text-[#E10600] mb-2" id="teamRankingTitle">🏆 Classifica Costruttori</h3>
                        <div id="teamRanking" class="space-y-1 text-sm"></div>
                    </div>
                </div>
                <div class="text-xs text-gray-500 pt-2 mt-4 border-t border-gray-700" id="classificaMeta"></div>
            </div>

            <!-- Pannello Calendario (Nascosto di default) -->
            <div id="calendarPanel" class="hidden md:max-w-sm bg-[#1E1E1E] p-4 rounded-xl border border-gray-800 mb-6 space-y-3">
                <h3 class="text-sm font-bold text-[#E10600]" id="calendarPanelTitle">📅 Calendario</h3>
                <div id="calendarList" class="space-y-1 text-sm"></div>
                <div class="text-xs text-gray-500 pt-2 border-t border-gray-700" id="calendarMeta"></div>
            </div>
        </div>

        <!-- Divisore trascinabile (solo desktop) per ridimensionare le due colonne.
             Ancorato verticalmente al centro del grafico (non a tutta l'altezza
             della colonna), così non si sposta quando si apre il pannello classifica. -->
        <div id="resizeHandle" class="hidden md:flex md:sticky md:top-8 relative cursor-col-resize group">
            <div class="absolute left-1/2 -translate-x-1/2 w-1 h-24 rounded-full bg-gray-700 group-hover:bg-[#E10600] transition-colors"></div>
        </div>

        <!-- Colonna destra (desktop): lista dettagli, impilata verticalmente.
             Larghezza limitata via JS al massimo alla misura "di default" (vedi
             applyDetailsColumnWidth): il ridimensionamento del grafico può farla
             restringere (se il grafico si allarga oltre il default) ma mai
             allargare oltre la dimensione di default. È ancorata al bordo destro
             (margin-left: auto), così resta sempre nella stessa posizione e non
             si sovrappone mai al pannello Classifica, qualunque sia il drag. -->
        <div id="detailsColumn">
            <h2 class="text-lg font-bold mb-3 text-gray-200">Dettagli Qualifiche</h2>
            <div id="detailsList" class="space-y-3">
                <!-- I dettagli compariranno qui -->
            </div>
        </div>

    </div>

    <script>
        // baseData = fonte di verità "ufficiale", caricata da data.json con fetch() più sotto.
        let baseData = [];
        let poleData = [];
        let standingsData = null; // classifica piloti/costruttori reale, da standings.json
        let calendarData = null; // calendario stagione in corso, da calendar.json

        const select = document.getElementById('circuitSelect');
        const detailsList = document.getElementById('detailsList');
        const dataSourceBadge = document.getElementById('dataSourceBadge');
        let currentChart = null;

        function populateCircuitSelectors(circuits) {
            select.innerHTML = '';
            circuits.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.innerText = c;
                select.appendChild(opt);
            });
        }

        async function initApp() {
            try {
                const response = await fetch('data.json', { cache: 'no-store' });
                if(!response.ok) throw new Error('data.json non raggiungibile (status ' + response.status + ')');
                baseData = await response.json();
                if(dataSourceBadge) dataSourceBadge.innerText = '🟢 Dati aggiornati da data.json';
            } catch(err) {
                // Probabile apertura del file in locale (file://) oppure data.json assente.
                console.error('Impossibile caricare data.json:', err);
                if(dataSourceBadge) dataSourceBadge.innerText = '🔴 Errore: data.json non raggiungibile';
                detailsList.innerHTML = `
                    <div class="bg-[#1E1E1E] border border-red-800 rounded-xl p-4 text-sm text-gray-300">
                        <p class="font-bold text-red-500 mb-1">⚠️ Impossibile caricare i dati</p>
                        <p>Il file <code>data.json</code> non è raggiungibile. Se hai aperto questo file in locale con doppio click, servilo tramite un server HTTP oppure visita il sito pubblicato online.</p>
                    </div>`;
                return;
            }

            poleData = [...baseData];

            try {
                const standingsResponse = await fetch('standings.json', { cache: 'no-store' });
                if (standingsResponse.ok) standingsData = await standingsResponse.json();
            } catch (err) {
                console.warn('Impossibile caricare standings.json (classifica campionato):', err);
            }

            try {
                const calendarResponse = await fetch('calendar.json', { cache: 'no-store' });
                if (calendarResponse.ok) {
                    calendarData = await calendarResponse.json();
                    const calendarButtonLabel = document.getElementById('calendarButtonLabel');
                    if (calendarButtonLabel) calendarButtonLabel.innerText = `Calendario ${calendarData.season}`;
                }
            } catch (err) {
                console.warn('Impossibile caricare calendar.json:', err);
            }

            const uniqueCircuits = [...new Set(poleData.map(d => d.circuit))].sort();
            populateCircuitSelectors(uniqueCircuits);

            select.addEventListener('change', (e) => updateApp(e.target.value));

            const defaultCircuit = determineDefaultCircuit();
            const initialCircuit = (defaultCircuit && uniqueCircuits.includes(defaultCircuit)) ? defaultCircuit : uniqueCircuits[0];
            select.value = initialCircuit;
            updateApp(initialCircuit);
            applyChartHeight(); // posiziona anche il divisore orizzontale, centrato sul grafico
            applyDetailsColumnWidth();
        }

        // Circuito da mostrare di default all'apertura del sito: quello
        // dell'ultimo GP disputato, a meno che non sia già iniziato il
        // weekend del prossimo GP (dal venerdì delle prove libere in poi),
        // nel qual caso si mostra quello.
        function determineDefaultCircuit() {
            if (!calendarData) return null;
            const now = new Date();
            const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');

            const currentWeekend = calendarData.races.find(r => r.weekendStart && r.date && r.weekendStart <= todayStr && todayStr <= r.date);
            if (currentWeekend) return currentWeekend.circuit;

            const pastRaces = calendarData.races
                .filter(r => r.date && r.date <= todayStr)
                .sort((a, b) => b.date.localeCompare(a.date));
            return pastRaces.length > 0 ? pastRaces[0].circuit : null;
        }

        // --- DIVISORE TRASCINABILE (solo desktop) tra grafico e dettagli ---
        const mainGrid = document.getElementById('mainGrid');
        const resizeHandle = document.getElementById('resizeHandle');
        const MIN_RATIO = 0.3, MAX_RATIO = 0.78;
        const DEFAULT_LEFT_RATIO = 2 / 3; // larghezza "di default" del grafico, fissa
        let leftRatio = DEFAULT_LEFT_RATIO; // deve combaciare con "2fr 12px 1fr" di partenza

        function applyGridColumns() {
            const leftPct = (leftRatio * 100).toFixed(2);
            const rightPct = ((1 - leftRatio) * 100).toFixed(2);
            mainGrid.style.gridTemplateColumns = `${leftPct}% 12px ${rightPct}%`;
            applyDetailsColumnWidth();
            scheduleReposition();
        }

        // Il pannello Classifica ha una larghezza FISSA pari al 2/3 di default
        // del grafico, indipendente da un eventuale ridimensionamento live del
        // grafico stesso (leftRatio può cambiare col drag, DEFAULT_LEFT_RATIO no).
        const classificaPanel = document.getElementById('classificaPanel');
        function applyClassificaPanelWidth() {
            if (window.innerWidth < 768) {
                classificaPanel.style.width = '';
                return;
            }
            const totalWidth = mainGrid.getBoundingClientRect().width;
            const width = (totalWidth - 12) * DEFAULT_LEFT_RATIO;
            classificaPanel.style.width = width + 'px';
        }
        window.addEventListener('resize', applyClassificaPanelWidth);

        // La colonna "Dettagli Qualifiche" ha una larghezza massima FISSA pari
        // al 2/3 di default del grafico (stessa base della classifica): il
        // drag della maniglia può solo restringerla (se il grafico si allarga
        // oltre il default), mai allargarla oltre il default. Ancorata al
        // bordo destro con margin-left:auto, così la sua posizione non
        // dipende mai da leftRatio e non si sovrappone mai al pannello
        // Classifica quando il grafico si restringe.
        const detailsColumn = document.getElementById('detailsColumn');
        function applyDetailsColumnWidth() {
            if (window.innerWidth < 768) {
                detailsColumn.style.width = '';
                detailsColumn.style.marginLeft = '';
                return;
            }
            const totalWidth = mainGrid.getBoundingClientRect().width;
            const defaultWidth = (totalWidth - 12) * (1 - DEFAULT_LEFT_RATIO);
            const liveWidth = (totalWidth - 12) * (1 - leftRatio);
            detailsColumn.style.width = Math.min(defaultWidth, liveWidth) + 'px';
            detailsColumn.style.marginLeft = 'auto';
        }
        window.addEventListener('resize', applyDetailsColumnWidth);

        let dragging = false;
        resizeHandle.addEventListener('mousedown', (e) => {
            dragging = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const rect = mainGrid.getBoundingClientRect();
            let ratio = (e.clientX - rect.left) / rect.width;
            leftRatio = Math.min(MAX_RATIO, Math.max(MIN_RATIO, ratio));
            applyGridColumns();
        });
        window.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });

        // --- DIVISORE TRASCINABILE (solo desktop) per l'altezza del grafico ---
        const chartContainer = document.getElementById('chartContainer');
        const vResizeHandle = document.getElementById('vResizeHandle');
        const leftColumn = document.getElementById('leftColumn');
        const chartCard = document.getElementById('chartCard');
        const MIN_CHART_HEIGHT = 200, MAX_CHART_HEIGHT = 700;
        let chartHeight = 440; // deve combaciare con "md:h-[440px]" di partenza

        // Le due maniglie devono restare ancorate all'area di disegno REALE
        // del grafico (gli assi X/Y calcolati da Chart.js), non al bordo
        // della card (che include padding/etichetta) né tantomeno alla
        // colonna dei dettagli qualifiche. chartArea è la zona di plot vera
        // e propria, esclusi assi ed etichette.
        function getChartAreaRect() {
            if (!currentChart || !currentChart.chartArea) return null;
            const canvasRect = document.getElementById('poleChart').getBoundingClientRect();
            const a = currentChart.chartArea;
            return {
                top: canvasRect.top + a.top,
                bottom: canvasRect.top + a.bottom,
                left: canvasRect.left + a.left,
                right: canvasRect.left + a.right,
            };
        }

        // Maniglia larghezza (verticale): centrata sull'asse Y del grafico.
        // Il pallino interno è posizionato con "top" assoluto (non margin-top):
        // un margin-top sull'elemento sticky ne altererebbe anche la soglia di
        // aggancio dello scroll, facendolo restare "sticky" in un momento
        // diverso rispetto alla colonna del grafico (bug osservato scorrendo
        // la pagina). Con "top" assoluto sul figlio, l'elemento sticky esterno
        // non ha margini e resta perfettamente sincronizzato con leftColumn.
        function positionResizeHandle() {
            if (window.innerWidth < 768) return;
            // L'altezza "naturale" di resizeHandle deve combaciare con quella
            // di leftColumn (non con l'intera riga della griglia, che segue
            // anche la colonna dei dettagli molto più alta): altrimenti i due
            // elementi "sticky" si sganciano dallo scroll in punti diversi.
            resizeHandle.style.height = leftColumn.offsetHeight + 'px';
            const handleRect = resizeHandle.getBoundingClientRect();
            const pill = resizeHandle.firstElementChild;
            const area = getChartAreaRect();
            let centerY;
            if (area) {
                centerY = (area.top + area.bottom) / 2 - handleRect.top;
            } else {
                // Il grafico non è ancora pronto: fallback sul centro della card.
                const cardRect = chartCard.getBoundingClientRect();
                centerY = (cardRect.top - handleRect.top) + cardRect.height / 2;
            }
            pill.style.top = Math.max(0, centerY - pill.offsetHeight / 2) + 'px';
        }

        // Maniglia altezza (orizzontale): centrata sull'asse X del grafico.
        function positionVResizeHandle() {
            if (window.innerWidth < 768) return;
            const area = getChartAreaRect();
            if (!area) return;
            const handleRect = vResizeHandle.getBoundingClientRect();
            const pill = vResizeHandle.firstElementChild;
            const centerX = (area.left + area.right) / 2 - handleRect.left;
            pill.style.marginLeft = Math.max(0, centerX - pill.offsetWidth / 2) + 'px';
        }

        function repositionHandles() {
            positionResizeHandle();
            positionVResizeHandle();
        }

        // Chart.js si ridimensiona già da solo (ResizeObserver sul contenitore)
        // quando cambiano le dimensioni della card: chiamare chart.resize() a
        // mano qui interferisce con quel meccanismo e può azzerare la
        // larghezza del canvas. Si aspetta invece che Chart.js finisca il suo
        // resize automatico prima di leggere chartArea aggiornata (setTimeout
        // invece di requestAnimationFrame, che si è rivelato inaffidabile in
        // alcuni ambienti di test).
        function scheduleReposition() {
            // Riposiziona subito (sincrono): l'altezza di leftColumn è già
            // nota non appena cambia il DOM (es. apertura/chiusura pannelli),
            // e aspettare solo i 50ms sotto lascerebbe la maniglia sbagliata
            // (altezza vecchia) visibile per un istante, con un salto brusco
            // quando poi scatta alla misura giusta. Il setTimeout resta per
            // catturare l'assestamento asincrono di Chart.js (il suo resize
            // interno, che invece richiede tempo).
            repositionHandles();
            setTimeout(repositionHandles, 50);
        }

        function applyChartHeight() {
            chartContainer.style.height = window.innerWidth >= 768 ? chartHeight + 'px' : '';
            scheduleReposition();
        }

        let vDragging = false, vStartY = 0, vStartHeight = chartHeight;
        vResizeHandle.addEventListener('mousedown', (e) => {
            vDragging = true;
            vStartY = e.clientY;
            vStartHeight = chartHeight;
            document.body.style.cursor = 'row-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!vDragging) return;
            const delta = e.clientY - vStartY;
            chartHeight = Math.min(MAX_CHART_HEIGHT, Math.max(MIN_CHART_HEIGHT, vStartHeight + delta));
            applyChartHeight();
        });
        window.addEventListener('mouseup', () => {
            if (!vDragging) return;
            vDragging = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });
        window.addEventListener('resize', applyChartHeight);

        function formatSecondsToTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = Math.floor(totalSeconds % 60);
            const ms = Math.round((totalSeconds % 1) * 1000);
            return mins + ':' + secs.toString().padStart(2, '0') + '.' + ms.toString().padStart(3, '0');
        }

        // --- VISTA CLASSIFICA ---
        function toggleClassificaPanel() {
            const panel = document.getElementById('classificaPanel');
            const wasHidden = panel.classList.contains('hidden');
            // I due pannelli sono mutuamente esclusivi: aprirne uno chiude l'altro.
            document.getElementById('calendarPanel').classList.add('hidden');
            panel.classList.toggle('hidden', !wasHidden);
            if(!panel.classList.contains('hidden')) {
                renderClassifica();
                applyClassificaPanelWidth();
            }
            scheduleReposition(); // l'altezza di leftColumn è cambiata
        }

        function renderClassifica() {
            const driverRanking = document.getElementById('driverRanking');
            const teamRanking = document.getElementById('teamRanking');
            const classificaMeta = document.getElementById('classificaMeta');

            if (!standingsData) {
                driverRanking.innerHTML = '';
                teamRanking.innerHTML = '';
                classificaMeta.innerText = '⚠️ Classifica non disponibile (standings.json non raggiungibile).';
                return;
            }

            const medal = (i) => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;

            document.getElementById('driverRankingTitle').innerText = `🏆 Classifica Piloti ${standingsData.season}`;
            document.getElementById('teamRankingTitle').innerText = `🏆 Classifica Costruttori ${standingsData.season}`;

            driverRanking.innerHTML = standingsData.drivers.map((d, i) => `
                <div class="flex justify-between items-center bg-gray-900 rounded px-3 py-1.5">
                    <span>${medal(i)} ${d.driver} <span class="text-gray-500">(${d.team})</span></span>
                    <span class="font-bold text-[#E10600]">${d.points} pt</span>
                </div>
            `).join('');

            teamRanking.innerHTML = standingsData.constructors.map((c, i) => `
                <div class="flex justify-between items-center bg-gray-900 rounded px-3 py-1.5">
                    <span>${medal(i)} ${c.team}</span>
                    <span class="font-bold text-[#E10600]">${c.points} pt</span>
                </div>
            `).join('');

            const updatedDate = new Date(standingsData.updatedAt).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            classificaMeta.innerText = `Aggiornato al ${updatedDate}`;
        }

        function toggleCalendarPanel() {
            const panel = document.getElementById('calendarPanel');
            const wasHidden = panel.classList.contains('hidden');
            // I due pannelli sono mutuamente esclusivi: aprirne uno chiude l'altro.
            document.getElementById('classificaPanel').classList.add('hidden');
            panel.classList.toggle('hidden', !wasHidden);
            if(!panel.classList.contains('hidden')) {
                renderCalendar();
            }
            scheduleReposition(); // l'altezza di leftColumn è cambiata
        }

        function renderCalendar() {
            const calendarList = document.getElementById('calendarList');
            const calendarMeta = document.getElementById('calendarMeta');

            if (!calendarData) {
                calendarList.innerHTML = '';
                calendarMeta.innerText = '⚠️ Calendario non disponibile (calendar.json non raggiungibile).';
                return;
            }

            document.getElementById('calendarPanelTitle').innerText = `📅 Calendario ${calendarData.season}`;

            calendarList.innerHTML = calendarData.races.map(r => `
                <div class="flex justify-between items-center bg-gray-900 rounded px-3 py-1.5 gap-2">
                    <span class="text-gray-400 shrink-0">${r.round}. ${r.circuit}</span>
                    <span class="text-right ${r.winner ? 'font-bold text-[#E10600]' : 'text-gray-600 italic'}">
                        ${r.winner ? `${r.winner.driver} (${r.winner.team})` : 'Da disputare'}
                    </span>
                </div>
            `).join('');

            const updatedDate = new Date(calendarData.updatedAt).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            calendarMeta.innerText = `Aggiornato al ${updatedDate}`;
        }

        function updateApp(circuitName) {
            const filtered = poleData.filter(d => d.circuit === circuitName).sort((a,b) => a.year - b.year);
            
            if(currentChart) currentChart.destroy();
            
            const ctx = document.getElementById('poleChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(d => d.year),
                    datasets: [{
                        data: filtered.map(d => d.seconds),
                        borderColor: '#E10600',
                        backgroundColor: 'rgba(225, 6, 0, 0.1)',
                        borderWidth: 3,
                        tension: 0.2,
                        pointBackgroundColor: '#ffffff',
                        pointHoverBackgroundColor: '#E10600',
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            grid: { color: '#2a2a2a' },
                            ticks: { 
                                color: '#a0aec0',
                                callback: function(value) { return formatSecondsToTime(value); }
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#a0aec0' }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return " Tempo: " + filtered[context.dataIndex].timeStr;
                                }
                            }
                        }
                    }
                }
            });
            scheduleReposition();

            // Record storico del circuito = tempo più basso tra tutti gli anni disponibili
            const recordSeconds = filtered.length > 0 ? Math.min(...filtered.map(d => d.seconds)) : null;

            detailsList.innerHTML = '';
            [...filtered].reverse().forEach(d => {
                const isRecord = recordSeconds !== null && d.seconds === recordSeconds;
                const card = document.createElement('div');
                card.className = "bg-[#1E1E1E] p-4 rounded-xl border flex flex-col gap-1 transition-all duration-200 hover:border-gray-700 " +
                    (isRecord ? "border-yellow-500" : "border-gray-800");
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-400">Anno ${d.year} ${isRecord ? '<span class="text-yellow-400" title="Record storico del circuito">🏆 Record</span>' : ''}</span>
                        <span class="text-xl font-black text-[#E10600] tracking-tight">${d.timeStr}</span>
                    </div>
                    <div class="text-sm text-gray-200 mt-1">🏎️ <span class="font-semibold text-white">${d.driver}</span></div>
                    <div class="text-xs text-gray-400">Scuderia: <span class="text-gray-300 font-medium">${d.team}</span></div>
                    <div class="text-xs text-cyan-400 mt-1 flex items-center gap-1">Metereologia: ${d.weather}</div>
                    ${d.penaltyNote ? `<div class="text-xs text-orange-400 mt-1 flex items-start gap-1 border-t border-gray-800 pt-1">⚠️ <span>${d.penaltyNote}</span></div>` : ''}
                `;
                detailsList.appendChild(card);
            });
        }

        initApp();
    </script>
</body>
</html>
