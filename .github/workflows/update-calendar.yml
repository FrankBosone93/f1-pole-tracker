name: Aggiorna calendario F1

on:
  schedule:
    # Gira DOPO la gara (serve il vincitore), stesso orario di
    # check-pole-penalty.yml e update-standings.yml: domenica 18:00 e 22:00
    # UTC, più un run di sicurezza lunedì mattina per le gare che finiscono
    # più tardi (es. Messico, Brasile, Las Vegas) o in caso di gare interrotte.
    - cron: '0 18 * * 0'
    - cron: '0 22 * * 0'
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # permette di lanciarlo manualmente da GitHub > Actions > Run workflow

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Esegui aggiornamento calendario
        run: node scripts/update-calendar.js

      - name: Commit e push se calendar.json è cambiato
        run: |
          if git diff --quiet -- calendar.json; then
            echo "Nessuna modifica a calendar.json, niente da committare."
          else
            git config user.name "F1 Pole Tracker Bot"
            git config user.email "actions@users.noreply.github.com"
            git add calendar.json
            git commit -m "📅 Aggiornamento automatico calendario"
            git push
          fi
