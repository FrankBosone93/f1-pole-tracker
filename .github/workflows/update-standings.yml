name: Aggiorna classifica campionato F1

on:
  schedule:
    # Gira DOPO la gara (i punti si assegnano in gara, non in qualifica),
    # stesso orario di check-pole-penalty.yml: domenica 18:00 e 22:00 UTC,
    # più un run di sicurezza lunedì mattina per le gare che finiscono più
    # tardi (es. Messico, Brasile, Las Vegas) o in caso di gare interrotte.
    - cron: '0 18 * * 0'
    - cron: '0 22 * * 0'
    - cron: '0 6 * * 1'
  workflow_dispatch: {}   # permette di lanciarlo manualmente da GitHub > Actions > Run workflow

permissions:
  contents: write

jobs:
  update-standings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Esegui aggiornamento classifica piloti/costruttori
        run: node scripts/update-standings.js

      - name: Commit e push se standings.json è cambiato
        run: |
          if git diff --quiet -- standings.json; then
            echo "Nessuna modifica a standings.json, niente da committare."
          else
            git config user.name "F1 Pole Tracker Bot"
            git config user.email "actions@users.noreply.github.com"
            git add standings.json
            git commit -m "🏆 Aggiornamento automatico classifica campionato"
            git push
          fi
